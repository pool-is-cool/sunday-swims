name: Collect weather & canal data

on:
  schedule:
    # Every day at 06:00 UTC (= 08:00 Brussels summer time)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger via GitHub website
  push:
    branches: [main]
    paths:
      - 'data/metingen.csv'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collection
        env:
          HIC_TOKEN: ${{ secrets.HIC_TOKEN }}
        run: python collect_weather.py

      - name: Commit and push updated data
        run: |
          git config user.name  "Sunday Swims Bot"
          git config user.email "bot@sundayswims"
          git add data/sunday_swims_data.json
          git diff --cached --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push
